<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Closing Screen Full</title>

<style>
html,
body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:transparent;
}

/* Menutupi seluruh layar */
.logo{
    position:fixed;
    top:0;
    left:0;
    width:100vw;
    height:100vh;

    object-fit:cover;

    opacity:1;
    z-index:9999;
    pointer-events:none;
}
</style>

</head>

<body>

<img
    class="logo"
    src="logo tengah warna.png"
    alt="Closing Screen"
>

</body>
</html>
