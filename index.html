<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>50% tengah</title>

<style>
html,
body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:transparent;
}

.logo{
    position:fixed;
    top:20px;
    left:20px;

    /* ukuran logo untuk canvas 1920x1080 */
    width:180px;
    height:auto;

    opacity:0.8;
    z-index:9999;
    pointer-events:none;
}
</style>

</head>

<body>

<img
    class="logo"
    src="logo tengah warna.png"
    alt="Logo"
>

</body>
</html>
